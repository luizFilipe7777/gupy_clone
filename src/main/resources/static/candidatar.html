<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enviar Currículo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 30px auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { color: #2c3e50; text-align: center; font-size: 24px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #34495e; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #bdc3c7; border-radius: 4px; box-sizing: border-box; }
        .btn-submit {
            width: 100%;
            background: #3498db;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-submit:hover { background: #2980b9; }
        .btn-voltar { display: block; text-align: center; margin-top: 15px; color: #7f8c8d; text-decoration: none; }
    </style>
</head>
<body>

    <div class="container">
        <h1>✉ Enviar Candidatura</h1>
        
        <form id="form-candidatura">
            <div class="form-group">
                <label>Seu Nome Completo:</label>
                <input type="text" id="nomeCandidato" required placeholder="Ex: João Silva">
            </div>

            <div class="form-group">
                <label>E-mail:</label>
                <input type="email" id="email" required placeholder="Ex: joao@email.com">
            </div>

            <div class="form-group">
                <label>Telefone:</label>
                <input type="text" id="telefone" required placeholder="Ex: (21) 99999-9999">
            </div>

            <div class="form-group">
                <label>Link do Currículo (LinkedIn ou Google Drive):</label>
                <input type="url" id="linkCurriculo" required placeholder="https://linkedin.com">
            </div>

            <button type="submit" class="btn-submit">Confirmar Inscrição</button>
        </form>

        <a href="index.html" class="btn-voltar">⬅ Cancelar</a>
    </div>

    <script>
        // Pega o ID da vaga que o JavaScript do index passou pela URL
        const urlParams = new URLSearchParams(window.location.search);
        const vagaId = urlParams.get('vagaId');

        document.getElementById('form-candidatura').addEventListener('submit', async (e) => {
            e.preventDefault();

            const dadosCandidato = {
                vagaId: parseInt(vagaId),
                nomeCandidato: document.getElementById('nomeCandidato').value,
                email: document.getElementById('email').value,
                telefone: document.getElementById('telefone').value,
                linkCurriculo: document.getElementById('linkCurriculo').value
            };

            try {
                const resposta = await fetch('http://localhost:8080/api/candidaturas', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dadosCandidato)
                });

                if (resposta.ok) {
                    alert('Sua candidatura foi enviada com sucesso! Boa sorte! 🚀');
                    window.location.href = 'index.html';
                } else {
                    alert('Erro ao enviar a candidatura.');
                }
            } catch (erro) {
                console.error('Erro:', erro);
                alert('Erro ao se conectar ao servidor.');
            }
        });
    </script>
</body>
</html>
